# nginx config for the Prompt Manager system (Windows).
# ONE public entry point (port 80) serving the React frontend, and
# splitting API traffic between TWO independent backend services:
#   /prompts/* -> prompt-service on port 8000
#   /reviews/* -> review-service on port 8001

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    server {
        listen 80;
        server_name localhost;

        # ---- Frontend: serve the React build output ----
        # CHANGE THIS to your actual path to frontend/dist.
        # Use forward slashes even on Windows.
        root   "C:/path/to/prompt-manager/frontend/dist";
        index  index.html;

        location / {
            try_files $uri /index.html;
        }

        # ---- prompt-service ----
        location /prompts {
            proxy_pass http://127.0.0.1:8000/prompts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- review-service ----
        location /reviews {
            proxy_pass http://127.0.0.1:8001/reviews;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
