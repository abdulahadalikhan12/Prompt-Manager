# nginx config for the Prompt Manager system (Windows).
# ONE public entry point (port 80) serving the React frontend, and
# splitting API traffic across THREE backend services:
#   /prompts/* and /chats/* -> prompt-service on port 8000
#   /reviews/*               -> review-service on port 8001
#   llm-service (port 8002) is never exposed publicly -- only
#   prompt-service and review-service talk to it directly, server-side.

worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # PDFs / DOCX uploads from the chat sidebar go to document-service,
    # which caps at 20MB -- give nginx headroom so the limit is the
    # service's, not the proxy's.
    client_max_body_size 25M;

    server {
        listen 80;
        server_name localhost;

        # ---- Frontend: serve the React build output ----
        # CHANGE THIS to your actual path to frontend/dist.
        # Use forward slashes even on Windows.
        root /usr/share/nginx/html;
        index  index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- prompt-service ----
        location /prompts {
            proxy_pass http://prompt-service:8000/prompts;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- prompt-service: chats (Week 2, same backend as /prompts,
        # different path prefix) ----
        location /chats {
            proxy_pass http://prompt-service:8000/chats;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Generation can take a while -- give the proxy itself a
            # longer read timeout so nginx doesn't give up before
            # prompt-service/llm-service do.
            proxy_read_timeout 70s;
        }

        # ---- review-service ----
        location /reviews {
            proxy_pass http://review-service:8001/reviews;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ---- document-service: file upload + extracted text ----
        location /documents {
            proxy_pass http://document-service:8003/documents;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # PDF/DOCX parsing is CPU-bound and can take a moment on
            # very large files; let document-service finish before
            # nginx times out the proxy connection.
            proxy_read_timeout 60s;
        }
    }
}
